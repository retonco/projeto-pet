<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pets</title>
</head>

<body>

<div style="display: flex; gap: 5px; align-items: flex-start;">

    <!-- PETS -->
    <div style="flex: 1;">
        <h1>Cadastro de Pets</h1>

        <form id="petForm">
            <input type="text" id="nome" placeholder="Nome" required><br>
            <input type="text" id="especie" placeholder="Espécie"><br>

            <select id="sexo" required>
                <option value="">Selecione o sexo</option>
                <option value="MACHO">Macho</option>
                <option value="FEMEA">Fêmea</option>
            </select><br>

            <input type="text" id="raca" placeholder="Raça"><br>
            <input type="number" id="idade" placeholder="Idade" min="0" required><br>
            <input type="text" id="imagem" placeholder="Imagem URL"><br>

            <button type="submit">Salvar</button>
        </form>
    </div>

    <!-- ADOTANTES -->
    <div style="flex: 1;">
        <h1>Cadastro de Adotantes</h1>

        <form id="adotanteForm">
            <input type="text" id="adotanteNome" placeholder="Nome" required><br>
            <input type="email" id="adotanteEmail" placeholder="Email" required><br>
            <input type="text" id="adotanteTelefone" placeholder="Telefone"><br>

            <button type="submit">Salvar Adotante</button>
        </form>
    </div>

</div>

<h2>Lista de Pets para Adoção</h2>
<div id="lista" style="
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
"></div>


<script>
    const API_ADOTANTES = "http://localhost:8080/adotantes";

    async function getAdotantes(){
        const response = await fetch(API_ADOTANTES);
        return await response.json();
    }

    async function loadAdotantes(){
        const response = await fetch(API_ADOTANTES);
        const adotantes = await response.json();

        const lista = document.getElementById("listaAdotantes");
        lista.innerHTML = "";

        adotantes.forEach(a => {
            const li = document.createElement("div");
            li.innerHTML = `${a.nome} (${a.email})`;
            lista.appendChild(li);
        });
    }

    const API = "http://localhost:8080/bobconnect/pets";

    // ================== LOAD ==================
    async function loadPets() {
        const response = await fetch(API);
        const pets = await response.json();

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        pets.forEach(p => {

            const li = document.createElement("div");

            li.innerHTML = `
        <div onclick="toggleDetails(${p.id})" style="cursor: pointer;">

            <img src="${p.imagem}" width="100" height="100" style="object-fit: cover; border-radius: 8px;"><br>

            <strong>${p.nome}</strong> (${p.especie})
        </div>

        <div id="details-${p.id}" style="display: none; margin-top: 5px;">
    <p>Sexo: ${p.sexo}</p>
    <p>Raça: ${p.raca}</p>
    <p>Idade: ${p.idade}</p>
    <p>Status: ${p.adotanteNome ? "❌ Adotado" : "✅ Disponível"}</p>

    <button onclick="event.stopPropagation(); editPet(...)">Editar</button>
    <button onclick="event.stopPropagation(); deletePet(${p.id})">Excluir</button>

    ${!p.adotanteNome ? `
        <button onclick="event.stopPropagation(); adotarPet(${p.id})">Adotar</button>
    ` : `
        <span style="color:red; font-weight:bold;"></span>
    `}
</div>
        `;

            lista.appendChild(li);
        });
    }

    // ================== DELETE ==================
    async function deletePet(id) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadPets();
    }

    // ================== EDIT ==================
    function mapSexoParaEnum(sexo){
        if(!sexo) return "";

        sexo = sexo.toLowerCase();

        if(sexo === "macho") return "MACHO";
        if(sexo === "fêmea" || sexo === "femea") return "FEMEA";

        return "";
    }

    function editPet(id, nome, especie, sexo, raca, idade, imagem){

        document.getElementById("nome").value = nome;
        document.getElementById("especie").value = especie;
        document.getElementById("sexo").value = mapSexoParaEnum(sexo);
        document.getElementById("raca").value = raca;
        document.getElementById("idade").value = idade;
        document.getElementById("imagem").value = imagem;

        document.getElementById("petForm").dataset.id = id;
    }

    // ================== CREATE / UPDATE ==================
    document.getElementById("petForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const id = e.target.dataset.id;

        const idadeInput = document.getElementById("idade").value;

        if (!idadeInput || idadeInput < 0) {
            alert("Idade inválida");
            return;
        }

        const pet = {
            nome: document.getElementById("nome").value,
            especie: document.getElementById("especie").value,
            sexo: document.getElementById("sexo").value,
            raca: document.getElementById("raca").value,
            idade: parseInt(idadeInput),
            imagem: document.getElementById("imagem").value
        };

        if(id){
            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(pet)
            });
        } else {
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(pet)
            });
        }

        e.target.reset();
        e.target.dataset.id = "";

        loadPets();
    });
    // ================== ADOTAR ==================
    async function adotarPet(id){

        try {
            const adotantes = await getAdotantes();

            // cria lista numerada (fake)
            const listaNumerada = adotantes.map((a, index) =>
                `${index + 1} - ${a.nome}`
            ).join("\n");

            const escolha = prompt(
                "Escolha o número do adotante:\n\n" + listaNumerada
            );

            if(!escolha){

                return;
            }

            const indexEscolhido = parseInt(escolha) - 1;

            // valida escolha
            if(indexEscolhido < 0 || indexEscolhido >= adotantes.length){
                alert("Opção inválida");
                return;
            }

            // pega o ID REAL
            const adotanteId = adotantes[indexEscolhido].id;

            const response = await fetch(`${API}/${id}/adotar/${adotanteId}`, {
                method: "POST"
            });

            if(!response.ok){
                throw new Error("Este pet já foi adotado");
            }

            alert("Pet adotado com sucesso!");
            loadPets();

        } catch (error) {
            alert(error.message);
        }
    }

    // ================== CADASTRA ADOTANTE ==================
    document.getElementById("adotanteForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const adotante = {
            nome: document.getElementById("adotanteNome").value,
            email: document.getElementById("adotanteEmail").value,
            telefone: document.getElementById("adotanteTelefone").value
        };

        await fetch(API_ADOTANTES, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(adotante)
        });

        e.target.reset();

        loadAdotantes();
    });

    // ================== TOGGLE ==================
    function toggleDetails(id){
        const div = document.getElementById(`details-${id}`);
        div.style.display = div.style.display === "none" ? "block" : "none";
    }

    // ================== INIT ==================
    loadPets();

</script>

</body>
</html>
